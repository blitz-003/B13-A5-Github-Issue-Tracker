<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Geist", sans-serif;
      }
      .tab-active {
        background: #4f46e5 !important;
        color: white !important;
        border-color: #4f46e5 !important;
      }
    </style>
    <!-- <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4f46e5",
            },
          },
        },
      };
    </script> -->
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <div
      class="navbar bg-white border-b border-gray-200 px-6 sticky top-0 z-50 mb-10"
    >
      <div class="navbar-start gap-2">
        <!-- GitHub Logo -->
        <img src="./assets/github-logo.png" alt="github-logo" class="w-10" />
        <span class="font-bold text-lg text-slate-800"
          >GitHub Issues Tracker</span
        >
      </div>
      <div class="navbar-end gap-3">
        <div class="form-control">
          <div
            class="input input-bordered flex items-center gap-2 bg-gray-50 w-64"
          >
            <img src="./assets/MagnifyingGlass.png" />
            <input
              type="text"
              placeholder="Search issues..."
              class="grow bg-transparent outline-none text-sm"
              id="search-input"
            />
          </div>
        </div>
        <button
          class="btn text-white text-sm font-semibold px-4"
          style="background: #4f46e5; border-color: #4f46e5"
        >
          + New Issue
        </button>
      </div>
    </div>

    <div class="w-11/12 mx-auto">
      <div class="card bg-white shadow-sm border border-gray-200 mb-4">
        <div class="card-body">
          <!-- Panel Header -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <!-- Filter Tabs -->
              <div class="flex gap-2">
                <button
                  onclick="filterIssues('all')"
                  id="tab-all"
                  class="btn btn-sm rounded-full tab-active px-6"
                >
                  All
                </button>
                <button
                  onclick="filterIssues('open')"
                  id="tab-open"
                  class="btn btn-sm btn-outline rounded-full px-6 border-gray-300 text-gray-600"
                >
                  Open
                </button>
                <button
                  onclick="filterIssues('closed')"
                  id="tab-closed"
                  class="btn btn-sm btn-outline rounded-full px-6 border-gray-300 text-gray-600"
                >
                  Closed
                </button>
              </div>
            </div>

            <div class="flex items-center gap-4 text-sm"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="w-11/12 mx-auto">
      <div class="card bg-white shadow-sm border border-gray-200">
        <div class="card-body">
          <!-- Panel Header -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div
                class="w-9 h-9 rounded-full flex items-center justify-center"
                style="
                  background: linear-gradient(135deg, #818cf880, #c084fc80);
                "
              >
                <img src="./assets/Aperture.png" alt="" srcset="" />
              </div>
              <div>
                <h2 class="text-xl font-bold text-slate-800">50 Issues</h2>
                <p class="text-sm text-gray-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex items-center gap-4 text-sm">
              <span class="flex items-center gap-1.5"
                ><span
                  class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"
                ></span
                ><span class="text-gray-600">Open</span></span
              >
              <span class="flex items-center gap-1.5"
                ><span
                  class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"
                ></span
                ><span class="text-gray-600">Closed</span></span
              >
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Issues Grid -->

    <div class="w-11/12 mx-auto pt-4 pb-8">
      <div class="card shadow-sm border border-gray-200">
        <div
          id="issues-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"
        >
          <!-- Cards injected by JS -->
        </div>
      </div>
    </div>
    <script src="./tracker.js" defer></script>
  </body>
</html>
